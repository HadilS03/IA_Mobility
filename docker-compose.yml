# Orchestration complète d'IA Mobility : base + API + frontend.
#
# Démo de bout en bout : `docker compose up --build`
#   - base PostgreSQL initialisée avec le schéma ;
#   - service IA qui importe les données puis expose l'API sur le port 5000 ;
#   - frontend servi sur http://localhost:3000.
# Les identifiants viennent du fichier .env (voir .env.example), jamais du code.

services:
  db:
    image: postgres:16-alpine
    container_name: ia_mobility_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Expose la base sur la machine hôte (port configurable via DB_PORT).
      # Par défaut 5433 pour ne pas entrer en conflit avec un PostgreSQL déjà
      # installé localement, qui occupe souvent le port 5432.
      - "${DB_PORT:-5433}:5432"
    volumes:
      # Persiste les données entre deux redémarrages du conteneur.
      - db_data:/var/lib/postgresql/data
      # Le schéma est joué automatiquement au tout premier démarrage.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      # Permet aux autres services d'attendre que la base soit réellement prête.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./apps/ai-service
    container_name: ia_mobility_api
    restart: unless-stopped
    depends_on:
      db:
        # On attend que la base soit prête avant d'importer les données.
        condition: service_healthy
    environment:
      # Dans le réseau Docker, la base est joignable via le nom du service "db".
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BORDEAUX_API_KEY: ${BORDEAUX_API_KEY}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./apps/frontend
      args:
        # URL de l'API vue depuis le navigateur de l'utilisateur (machine hôte).
        VITE_API_URL: http://localhost:5000
    container_name: ia_mobility_frontend
    restart: unless-stopped
    depends_on:
      - ai-service
    ports:
      - "3000:80"

volumes:
  db_data:
